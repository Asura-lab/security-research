# fastapi-orm variant branch — 1 backend + frontend + postgres + datadog.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-research123}
      POSTGRES_DB: ${POSTGRES_DB:-shop}
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shop}"]
      interval: 5s
      timeout: 3s
      retries: 10

  datadog:
    image: gcr.io/datadoghq/agent:7
    restart: unless-stopped
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_DOGSTATSD_ORIGIN_DETECTION: "true"
    ports:
      - "8125:8125/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
    profiles: ["datadog"]

  backend:
    build: ./backends/fastapi/orm
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-research123}
      POSTGRES_DB: ${POSTGRES_DB:-shop}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:research123@postgres:5432/shop}
      JWT_SECRET: ${JWT_SECRET:-research-jwt-secret}
      IMPLEMENTATION: ${IMPLEMENTATION:-alpha}
      DD_AGENT_HOST: datadog
      DD_DOGSTATSD_PORT: 8125
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5002:5002"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:5002}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
